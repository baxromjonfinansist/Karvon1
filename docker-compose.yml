version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: yuk_postgres
    environment:
      POSTGRES_USER: yuk_user
      POSTGRES_PASSWORD: yuk_password
      POSTGRES_DB: yuk_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuk_user -d yuk_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yuk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
