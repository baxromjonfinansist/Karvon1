name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 164.92.238.73
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /root/yuk_marketplace_bot/deploy.sh
